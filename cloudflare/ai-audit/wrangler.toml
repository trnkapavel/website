name = "ai-audit-worker"
main = "src/index.ts"
compatibility_date = "2026-07-09"

# Nastav vlastní subdoménu v Cloudflare dashboardu (Workers Routes) po prvním
# deploy, např. api.trnka.website/audit -> tento worker.

kv_namespaces = [
  { binding = "RATE_LIMIT", id = "09103eb1adbe4f14860f63dc6d4094d0" }
]

# Secrets (nastavit přes `wrangler secret put <NAME>`, nikdy v repu):
#   ANTHROPIC_API_KEY
#   TURNSTILE_SECRET_KEY

# Nastav na skutečnou doménu webu zároveň s astro.config.mjs `site`.
[vars]
ALLOWED_ORIGIN = "https://trnka.website,http://localhost:4321"
